<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Luxara Joyería</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="public/logo.png" type="image/png">
    <style>
        .order-card {
            background: white;
            border-radius: .75rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .order-header {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #fafafa;
            border-bottom: 1px solid #eee;
        }
        .order-id    { font-weight: 700; color: var(--color-gold, #b8860b); }
        .order-date  { color: #888; font-size: .9rem; }
        .order-total { margin-left: auto; font-size: 1.05rem; }
        .order-items { padding: 1rem 1.5rem; }
        .order-item  {
            display: flex;
            justify-content: space-between;
            padding: .4rem 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: .95rem;
        }
        .order-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <img src="public/logo.png" alt="Luxara Joyería">
                </a>
                <nav class="nav-desktop">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="productos.html" class="nav-link">Productos</a>
                    <a href="nosotros.html" class="nav-link">Nosotros</a>
                    <a href="contacto.html" class="nav-link">Contacto</a>
                </nav>
                <div class="header-actions">
                    <a href="carrito.html" class="icon-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M9 2L7 6H3L6 20H18L21 6H17L15 2H9Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="9" cy="20" r="1"/><circle cx="15" cy="20" r="1"/>
                        </svg>
                        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                    </a>
                    <button class="btn btn-sm btn-secondary" onclick="AuthAPI.logout()"
                            style="font-size:.85rem">Cerrar sesión</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenido -->
    <main style="padding: 3rem 0; min-height: 80vh">
        <div class="container" style="max-width: 760px">
            <h1 style="margin-bottom: 2rem; font-size: 1.8rem">📦 Mis Pedidos</h1>
            <div id="pedidosContainer">
                <p style="text-align:center; padding:2rem">Cargando...</p>
            </div>
        </div>
    </main>

    <!-- Footer básico -->
    <footer style="background:#1a1a1a; color:#ccc; text-align:center; padding:1.5rem; font-size:.9rem">
        © 2024 Luxara Joyería — Villavicencio, Meta, Colombia
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/mis-pedidos.js"></script>
</body>
</html>
